<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WESCO — Direction E (Apple / IR Minimal)</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#FBFBFD; --panel:#F5F5F7; --ink:#1D1D1F; --sub:#6E6E73; --hair:#D2D2D7; --red:#C13816;
  --font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.6;letter-spacing:-.01em;overflow-x:hidden}
a{color:inherit;text-decoration:none}

.proto{background:#1D1D1F;color:#d9d9de;text-align:center;font-size:12px;letter-spacing:.05em;padding:9px}
.proto b{color:#fff}

/* Apple식 얇은 네비 */
.nav{position:sticky;top:0;z-index:20;background:rgba(251,251,253,.8);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,.06)}
.nav__in{max-width:1000px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 22px}
.nav__in img{height:30px;display:block;opacity:.9}
.nav__menu{display:flex;gap:34px;font-size:13px;font-weight:500;color:#333}
.nav__menu a{opacity:.85;transition:opacity .2s}
.nav__menu a:hover{opacity:1}
@media(max-width:720px){.nav__menu{gap:20px;font-size:12px}}

/* HERO — 중앙 정렬, 광활한 여백, 대형 제품 */
.hero{text-align:center;padding:clamp(56px,9vw,120px) 22px 0}
.eyebrow{font-size:clamp(15px,1.4vw,19px);font-weight:600;color:var(--red);letter-spacing:0;margin-bottom:14px;
  opacity:0;animation:fade .8s .05s forwards}
.hero h1{font-size:clamp(38px,6.6vw,88px);font-weight:600;line-height:1.06;letter-spacing:-.035em;color:var(--ink);
  max-width:16ch;margin:0 auto;word-break:keep-all;opacity:0;animation:rise 1s .12s cubic-bezier(.19,1,.22,1) forwards}
.hero .sub{margin:26px auto 0;max-width:40ch;font-size:clamp(17px,1.7vw,22px);line-height:1.5;color:var(--sub);
  font-weight:400;opacity:0;animation:rise 1s .28s cubic-bezier(.19,1,.22,1) forwards}
.hero .links{margin-top:26px;display:flex;gap:30px;justify-content:center;flex-wrap:wrap;
  opacity:0;animation:fade 1s .44s forwards}
.hero .links a{font-size:clamp(15px,1.5vw,19px);font-weight:500;color:var(--red);display:inline-flex;align-items:center;gap:5px}
.hero .links a .c{transition:transform .2s}
.hero .links a:hover .c{transform:translateX(4px)}
.hero .links a.muted{color:var(--ink)}

/* 대형 제품 이미지 */
.hero__stage{margin:clamp(30px,5vw,58px) auto 0;max-width:1000px;
  opacity:0;animation:reveal 1.3s .5s cubic-bezier(.19,1,.22,1) forwards}
.hero__stage img{width:100%;max-width:560px;height:auto;display:block;margin:0 auto;
  filter:drop-shadow(0 40px 60px rgba(29,29,31,.12))}
@keyframes fade{to{opacity:1}}
@keyframes rise{to{opacity:1;transform:none}}
.hero h1,.hero .sub{transform:translateY(20px)}
@keyframes reveal{from{opacity:0;transform:translateY(30px) scale(.98)}to{opacity:1;transform:none}}

/* 얇은 스펙 스트립 (IR식 절제된 지표) */
.spec{max-width:1000px;margin:clamp(44px,7vw,80px) auto 0;padding:0 22px}
.spec__grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--hair);
  border-top:1px solid var(--hair);border-bottom:1px solid var(--hair)}
.spec__cell{background:var(--bg);padding:34px 18px;text-align:center}
.spec__n{font-size:clamp(26px,3vw,40px);font-weight:600;letter-spacing:-.03em;color:var(--ink);line-height:1}
.spec__n i{font-style:normal;color:var(--red)}
.spec__k{margin-top:10px;font-size:13px;color:var(--sub);font-weight:500}
@media(max-width:640px){.spec__grid{grid-template-columns:1fr 1fr}
  .spec__cell:nth-child(-n+2){border-bottom:1px solid var(--hair)}}

.tail{text-align:center;padding:clamp(50px,8vw,90px) 22px}
.tail p{font-size:clamp(20px,2.4vw,30px);font-weight:600;letter-spacing:-.02em;color:var(--ink);max-width:20ch;margin:0 auto;line-height:1.3}
.tail p em{font-style:normal;color:var(--red)}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important}
  .eyebrow,.hero h1,.hero .sub,.hero .links,.hero__stage{opacity:1}
  .hero h1,.hero .sub{transform:none}
}
</style>
</head>
<body>
<div class="proto">방향 E 프로토타입 — <b>Apple / 삼성반도체 IR 톤</b> · 쿨 화이트·대형 제품·광활한 여백</div>

<nav class="nav"><div class="nav__in">
  <a href="#"><img src="images/wesco_logo.png" alt="WESCO"></a>
  <div class="nav__menu"><a href="#">회사</a><a href="#">기술</a><a href="#">제품</a><a href="#">실적</a><a href="#">문의</a></div>
</div></nav>

<section class="hero">
  <p class="eyebrow">WESCO TSP</p>
  <h1>생산의 연속성을 지킵니다.</h1>
  <p class="sub">눈에 보이지 않는 순간전압강하로부터 반도체·디스플레이 생산 라인을 지켜 온 25년.</p>
  <div class="links">
    <a href="#how">기술 알아보기 <span class="c">›</span></a>
    <a class="muted" href="#contact">도입 문의 <span class="c">›</span></a>
  </div>
  <div class="hero__stage">
    <img src="images/product/three_phase_main.png" alt="WESCO TSP 순간전압보상장치">
  </div>
</section>

<div class="spec">
  <div class="spec__grid">
    <div class="spec__cell"><div class="spec__n">150,000<i>+</i></div><div class="spec__k">누적 설치 (대)</div></div>
    <div class="spec__cell"><div class="spec__n">16</div><div class="spec__k">공급 국가</div></div>
    <div class="spec__cell"><div class="spec__n">900<i>+</i></div><div class="spec__k">고객사</div></div>
    <div class="spec__cell"><div class="spec__n">25</div><div class="spec__k">단일 분야 전문 (년)</div></div>
  </div>
</div>

<section class="tail">
  <p>제조사가 아니라, <em>Voltage Sag 솔루션</em> 전문기업입니다.</p>
</section>

</body>
</html>
